version: '3.8'

# Docker Compose pour le developpement local
# Utilise les images de base et monte les volumes pour le hot-reload

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: superkube-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/create-databases.sh:/docker-entrypoint-initdb.d/01-create-databases.sh
      - ./database/init.sql:/docker-entrypoint-initdb.d/02-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - superkube-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: superkube-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - superkube-network

  # Auth Service (dev mode)
  auth-service:
    image: node:18-alpine
    container_name: superkube-auth-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: superkube
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: superkubernetex-jwt-secret-key-2024
    volumes:
      - ./auth-service:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - superkube-network

  # Payment Service (dev mode)
  payment-service:
    image: node:18-alpine
    container_name: superkube-payment-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: superkube
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: superkubernetex-jwt-secret-key-2024
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./payment-service:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - superkube-network

  # Instance 1 (dev mode)
  instance1:
    image: node:18-alpine
    container_name: superkube-instance1-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      INSTANCE_NAME: instance1
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: instance1_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: superkubernetex-jwt-secret-key-2024
    volumes:
      - ./instance-service:/app
      - /app/node_modules
      - instance1_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - superkube-network

  # Instance 2 (dev mode)
  instance2:
    image: node:18-alpine
    container_name: superkube-instance2-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
      INSTANCE_NAME: instance2
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: instance2_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: superkubernetex-jwt-secret-key-2024
    volumes:
      - ./instance-service:/app
      - /app/node_modules
      - instance2_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - superkube-network

  # Instance 3 (dev mode)
  instance3:
    image: node:18-alpine
    container_name: superkube-instance3-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5003:5003"
    environment:
      PORT: 5003
      INSTANCE_NAME: instance3
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: instance3_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: superkubernetex-jwt-secret-key-2024
    volumes:
      - ./instance-service:/app
      - /app/node_modules
      - instance3_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - superkube-network

  # Frontend (dev mode)
  frontend:
    image: node:18-alpine
    container_name: superkube-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      AUTH_API_URL: http://localhost:4000
      PAYMENT_API_URL: http://localhost:4001
      INSTANCE1_API_URL: http://localhost:5001
      INSTANCE2_API_URL: http://localhost:5002
      INSTANCE3_API_URL: http://localhost:5003
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - superkube-network

networks:
  superkube-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  instance1_uploads:
  instance2_uploads:
  instance3_uploads:

